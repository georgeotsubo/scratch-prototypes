<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist Prototypes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #111;
    }

    .page {
      padding: 48px;
      max-width: 480px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #999;
      font-size: 14px;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .item a {
      display: block;
      font-size: 16px;
      font-weight: 600;
      color: #111;
      text-decoration: none;
      padding: 6px 0;
    }

    .item a:hover {
      text-decoration: underline;
    }

    .item p {
      font-size: 14px;
      color: #999;
      line-height: 1.4;
      margin-bottom: 2px;
    }

    /* Preview panel — fixed to the right, hidden until open */
    .preview-panel {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
    }

    .preview-panel.open {
      display: flex;
    }

    .preview-panel iframe {
      pointer-events: all;
      width: 393px;
      height: 852px;
      border: none;
      border-radius: 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      margin-right: calc(50vw - 196px - 80px);
    }

    /* Close button */
    .close-btn {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 101;
      pointer-events: all;
    }

    .close-btn svg {
      width: 14px;
      height: 14px;
      color: #111;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Playlist Prototypes</h1>
    <p class="subtitle">Scratch prototypes built with Claude Code.</p>
   <div class="list">
      <div class="item">
        <a href="/prototype-2/prototype.html" class="proto-link">Search UX Prototype</a>
        <p>Exploration for keyword and location search with unified input screens.</p>
      </div>
    </div>
  </div>

  <div class="preview-panel" id="preview-panel">
    <iframe id="preview-frame"></iframe>
  </div>

  <button class="close-btn" id="close-btn" aria-label="Close">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="1" y1="1" x2="13" y2="13"/>
      <line x1="13" y1="1" x2="1" y2="13"/>
    </svg>
  </button>

  <script>
    const panel = document.getElementById('preview-panel');
    const frame = document.getElementById('preview-frame');
    const closeBtn = document.getElementById('close-btn');

    document.querySelectorAll('.proto-link').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        frame.src = link.href;
        panel.classList.add('open');
        closeBtn.style.display = 'flex';
      });
    });

    closeBtn.addEventListener('click', () => {
      panel.classList.remove('open');
      closeBtn.style.display = 'none';
      frame.src = '';
    });
  </script>
</body>
</html>
