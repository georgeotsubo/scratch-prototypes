<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist Prototypes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111;
      color: #111;
      display: flex;
      height: 100vh;
    }

    /* Left sidebar */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: #fff;
      padding: 48px 32px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #999;
      font-size: 13px;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .item {
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .item:hover {
      background: #f5f5f5;
    }

    .item.active {
      background: #f1f2f3;
    }

    .item a {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #111;
      text-decoration: none;
      margin-bottom: 3px;
    }

    .item p {
      font-size: 12px;
      color: #999;
      line-height: 1.4;
    }

    /* Right preview panel */
    .preview {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .preview iframe {
      width: 393px;
      height: 852px;
      border: none;
      border-radius: 40px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      display: block;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1>Playlist Prototypes</h1>
    <p class="subtitle">Work in progress — built with Claude + Figma MCP.</p>
    <div class="list">
      <div class="item" data-href="/prototype-2/prototype.html">
        <a href="/prototype-2/prototype.html">Search UX Prototype — 2</a>
        <p>Exploration for keyword and location search with unified input screens.</p>
      </div>
    </div>
  </div>

  <div class="preview">
    <iframe id="preview-frame" src="/prototype-2/prototype.html"></iframe>
  </div>

  <script>
    const frame = document.getElementById('preview-frame');
    const items = document.querySelectorAll('.item');

    // Mark the active item based on current iframe src
    function setActive(href) {
      items.forEach(item => {
        item.classList.toggle('active', item.dataset.href === href);
      });
    }

    // Auto-mark first item active on load
    setActive('/prototype-2/prototype.html');

    items.forEach(item => {
      item.addEventListener('click', e => {
        e.preventDefault();
        const href = item.dataset.href;
        frame.src = href;
        setActive(href);
      });
    });
  </script>
</body>
</html>
